name: 'Terraform - Azure Linux VM'

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.0"

      # ===================== AZURE LOGIN =====================
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        run: az account show

      # ===================== TERRAFORM COMMANDS =====================
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Recursive
        run: terraform fmt -recursive

      - name: Terraform Validate
        run: terraform validate

      # ===================== PLAN =====================
      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
        run: terraform plan -out=tfplan

      # Comment plan result on Pull Requests
      - name: Comment Terraform Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout || steps.plan.outputs.stderr }}`;
            const body = `### 🔍 Terraform Plan Result\n\`\`\`terraform\n${output}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ===================== APPLY (Only on main branch) ======================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
        run: terraform apply -auto-approve tfplan